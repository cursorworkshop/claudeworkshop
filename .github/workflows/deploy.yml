name: GitHub Actions Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel config
        run: |
          VERCEL_TOKEN_CLEAN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '\r\n')"
          VERCEL_ORG_ID_CLEAN="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
          VERCEL_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_PROJECT_ID" | tr -d '\r\n')"
          test -n "$VERCEL_TOKEN_CLEAN"
          test -n "$VERCEL_ORG_ID_CLEAN"
          test -n "$VERCEL_PROJECT_ID_CLEAN"

      - name: Remove stale local Vercel state
        run: rm -rf .vercel

      - name: Pull Vercel Environment Information
        run: |
          VERCEL_TOKEN_CLEAN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '\r\n')"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN_CLEAN"

      - name: Deploy Source to Vercel
        run: |
          VERCEL_TOKEN_CLEAN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '\r\n')"
          vercel deploy --prod --archive=tgz --token="$VERCEL_TOKEN_CLEAN"
