name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BRAND_SYNC_TOKEN: ${{ secrets.BRAND_SYNC_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_CLAUDE_PROJECT_ID: prj_aGHPChctUlkHdDvTVNafXV9KAsj3
      VERCEL_CODEX_PROJECT_ID: prj_NSoYl4F3IhZI03Amn0kHBJ5oKr0i
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this run should deploy
        id: gate
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY##*/}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_message="$(git log -1 --pretty=%s)"

          if printf '%s' "$commit_message" | grep -Eq '\[skip deploy\]'; then
            echo "Skipping production deploy because this commit was already deployed by another workflow."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${GITHUB_ACTOR}" = "github-actions[bot]" ] && \
             [ "$commit_message" = "chore: run research cycle" ]; then
            echo "Skipping production deploy for the legacy research-cycle commit message; the nightly workflow already deploys all three sites."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$commit_message" | grep -Eq '^sync: mirror cursorworkshop@'; then
            echo "Skipping mirror auto-deploy for sync commit; source repo workflow already deploys all three sites."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          deploy_required=false

          while IFS= read -r file_path; do
            [ -z "$file_path" ] && continue

            case "$file_path" in
              .github/*|AGENTS.md|CLAUDE.md|README.md|docs/*|.prettierignore|scripts/sync-brand-sites.mjs|scripts/sync-nautilus-research-map.sh|scripts/vercel-deploy-with-retry.sh)
                ;;
              *)
                deploy_required=true
                break
                ;;
            esac
          done <<< "$changed_files"

          if [ "$deploy_required" = false ]; then
            echo "Skipping production deploy because this commit only changes workflow/docs/mirror-sync infrastructure."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.gate.outputs.should_deploy == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        if: steps.gate.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.gate.outputs.should_deploy == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        if: steps.gate.outputs.should_deploy == 'true'
        run: pnpm run format:check

      - name: Build application
        if: steps.gate.outputs.should_deploy == 'true'
        run: pnpm build

      - name: Install Vercel CLI
        if: steps.gate.outputs.should_deploy == 'true'
        run: npm install --global vercel@latest

      - name: Validate required Vercel secrets
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail

          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$(printf '%s' "$value" | tr -d '\r\n')" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          }

          require_secret VERCEL_TOKEN
          require_secret VERCEL_ORG_ID
          require_secret VERCEL_PROJECT_ID

      - name: Sync mirror repo deploy secrets from the source repo
        if: steps.gate.outputs.should_deploy == 'true' && github.repository_owner == 'cursorworkshop' && github.event.repository.name == 'cursorworkshop'
        env:
          GH_TOKEN: ${{ secrets.BRAND_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$(printf '%s' "$value" | tr -d '\r\n')" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          }

          require_secret GH_TOKEN
          require_secret VERCEL_TOKEN
          require_secret VERCEL_ORG_ID

          VERCEL_TOKEN_CLEAN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '\r\n')"
          VERCEL_ORG_ID_CLEAN="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
          VERCEL_CLAUDE_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CLAUDE_PROJECT_ID" | tr -d '\r\n')"
          VERCEL_CODEX_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CODEX_PROJECT_ID" | tr -d '\r\n')"

          sync_secret() {
            local repo="$1"
            local name="$2"
            local value="$3"
            gh secret set "$name" --repo "$repo" --body "$value"
          }

          sync_secret cursorworkshop/claudeworkshop VERCEL_TOKEN "$VERCEL_TOKEN_CLEAN"
          sync_secret cursorworkshop/claudeworkshop VERCEL_ORG_ID "$VERCEL_ORG_ID_CLEAN"
          sync_secret cursorworkshop/claudeworkshop VERCEL_PROJECT_ID "$VERCEL_CLAUDE_PROJECT_ID_CLEAN"
          sync_secret cursorworkshop/codexworkshop VERCEL_TOKEN "$VERCEL_TOKEN_CLEAN"
          sync_secret cursorworkshop/codexworkshop VERCEL_ORG_ID "$VERCEL_ORG_ID_CLEAN"
          sync_secret cursorworkshop/codexworkshop VERCEL_PROJECT_ID "$VERCEL_CODEX_PROJECT_ID_CLEAN"

      - name: Deploy this repo to its matching production site
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          bash scripts/vercel-deploy-with-retry.sh

      - name: Sync brand mirror repos after source deploy
        if: steps.gate.outputs.should_deploy == 'true' && github.repository_owner == 'cursorworkshop' && github.event.repository.name == 'cursorworkshop'
        run: |
          set -euo pipefail

          if [ -z "$(printf '%s' "${BRAND_SYNC_TOKEN:-}" | tr -d '\r\n')" ]; then
            echo "Missing required secret: BRAND_SYNC_TOKEN"
            exit 1
          fi

          node scripts/sync-brand-sites.mjs \
            --all \
            --push \
            --target-root "$RUNNER_TEMP/brand-sync"

      - name: Deploy synced mirror repos from the source workflow
        if: steps.gate.outputs.should_deploy == 'true' && github.repository_owner == 'cursorworkshop' && github.event.repository.name == 'cursorworkshop'
        run: |
          set -euo pipefail

          VERCEL_TOKEN_CLEAN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '\r\n')"
          VERCEL_ORG_ID_CLEAN="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
          VERCEL_CLAUDE_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CLAUDE_PROJECT_ID" | tr -d '\r\n')"
          VERCEL_CODEX_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CODEX_PROJECT_ID" | tr -d '\r\n')"

          deploy_site() {
            local site_dir="$1"
            local project_id="$2"

            (
              cd "$site_dir"
              export VERCEL_PROJECT_ID="$project_id"
              export VERCEL_ORG_ID="$VERCEL_ORG_ID_CLEAN"
              export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
              bash "$GITHUB_WORKSPACE/scripts/vercel-deploy-with-retry.sh"
            )
          }

          deploy_site "$RUNNER_TEMP/brand-sync/claudeworkshop" "$VERCEL_CLAUDE_PROJECT_ID_CLEAN"
          deploy_site "$RUNNER_TEMP/brand-sync/codexworkshop" "$VERCEL_CODEX_PROJECT_ID_CLEAN"

      - name: Verify production URLs respond after deploy
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail

          verify_url() {
            local url="$1"
            local code
            code="$(curl -s -o /dev/null -w '%{http_code}' "$url")"
            if [ "$code" != "200" ]; then
              echo "Expected 200 from $url but received $code"
              exit 1
            fi
          }

          repo_name="${GITHUB_REPOSITORY##*/}"

          if [ "$repo_name" = "cursorworkshop" ]; then
            verify_url "https://www.claudeworkshop.com"
            verify_url "https://www.claudeworkshop.com"
            verify_url "https://www.codexworkshop.com"
            exit 0
          fi

          case "${GITHUB_REPOSITORY}" in
            cursorworkshop/claudeworkshop)
              verify_url "https://www.claudeworkshop.com"
              ;;
            cursorworkshop/codexworkshop)
              verify_url "https://www.codexworkshop.com"
              ;;
            *)
              echo "No production URL mapping found for ${GITHUB_REPOSITORY}"
              exit 1
              ;;
          esac
