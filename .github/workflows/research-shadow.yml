name: Research Shadow Run

on:
  workflow_run:
    workflows:
      - Research Preflight Canary
    types:
      - completed
  workflow_dispatch:
    inputs:
      min_relevance:
        description: 'Override minimum relevance threshold (0-100)'
        required: false
        default: '25'
      image_min_score:
        description: 'Override hero image style score threshold (0-100)'
        required: false
        default: '96'
      image_max_attempts:
        description: 'Override max hero image retry attempts'
        required: false
        default: '6'
      min_word_count:
        description: 'Override minimum article word count'
        required: false
        default: '450'
      max_word_count:
        description: 'Override maximum article word count'
        required: false
        default: '1100'
      target_word_count:
        description: 'Preferred article word count target'
        required: false
        default: '900'

concurrency:
  group: research-shadow
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  shadow:
    if: >
      github.repository == 'cursorworkshop/claudeworkshop' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'schedule' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.repository.full_name == 'cursorworkshop/claudeworkshop'
        )
      )
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_TEXT_MODEL: ${{ secrets.OPENAI_TEXT_MODEL }}
      OPENAI_IMAGE_MODEL: ${{ secrets.OPENAI_IMAGE_MODEL }}
      OPENAI_IMAGE_REVIEW_MODEL: gpt-4.1-mini
      AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
      CT0: ${{ secrets.X_CT0 }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEARCH_NOTIFY_EMAILS: ${{ secrets.RESEARCH_NOTIFY_EMAILS }}
      RESEARCH_NOTIFY_FROM: ${{ secrets.RESEARCH_NOTIFY_FROM }}
      RESEARCH_NOTIFY_REPLY_TO: ${{ secrets.RESEARCH_NOTIFY_REPLY_TO }}
      RESEARCH_BASE_URL: ${{ secrets.RESEARCH_BASE_URL != '' && secrets.RESEARCH_BASE_URL || 'https://www.claudeworkshop.com/research' }}
      RESEARCH_SITE_BASE_URLS: ${{ secrets.RESEARCH_SITE_BASE_URLS != '' && secrets.RESEARCH_SITE_BASE_URLS || 'https://www.claudeworkshop.com/research,https://www.claudeworkshop.com/research,https://www.codexworkshop.com/research' }}
      BIRD_CMD: bird
      NAUTILUS_MIN_RELEVANCE: ${{ github.event.inputs.min_relevance || '25' }}
      NAUTILUS_IMAGE_MIN_SCORE: ${{ github.event.inputs.image_min_score || '96' }}
      NAUTILUS_IMAGE_MAX_ATTEMPTS: ${{ github.event.inputs.image_max_attempts || '6' }}
      NAUTILUS_MIN_WORD_COUNT: ${{ github.event.inputs.min_word_count || '450' }}
      NAUTILUS_MAX_WORD_COUNT: ${{ github.event.inputs.max_word_count || '1100' }}
      NAUTILUS_TARGET_WORD_COUNT: ${{ github.event.inputs.target_word_count || '900' }}
      OPENAI_REQUEST_TIMEOUT_MS: '180000'
      OPENAI_IMAGE_REQUEST_TIMEOUT_MS: '240000'
      BRAND_SYNC_TOKEN: ${{ secrets.BRAND_SYNC_TOKEN }}
      GH_TOKEN: ${{ secrets.BRAND_SYNC_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_CLAUDE_PROJECT_ID: prj_aGHPChctUlkHdDvTVNafXV9KAsj3
      VERCEL_CODEX_PROJECT_ID: prj_NSoYl4F3IhZI03Amn0kHBJ5oKr0i
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install Bird CLI
        run: |
          cd tools/bird-cli
          npm install
          npm run build
          echo "BIRD_CMD=node $GITHUB_WORKSPACE/tools/bird-cli/dist/index.js" >> "$GITHUB_ENV"
          node "$GITHUB_WORKSPACE/tools/bird-cli/dist/index.js" --version

      - name: Validate required research automation secrets
        env:
          GH_TOKEN: ${{ secrets.BRAND_SYNC_TOKEN }}
        run: |
          bash scripts/research-preflight.sh

      - name: Run shadow research generation path
        run: |
          node docs/nautilus/pipeline/run-cycle.mjs \
            --apply-to-cursor \
            --cursor-repo "$GITHUB_WORKSPACE"

      - name: Upload Nautilus debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nautilus-shadow-debug-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            docs/nautilus/data/live
            docs/nautilus/data/state
            docs/nautilus/data/outbox

      - name: Codex polish shadow article
        id: codex_polish_shadow
        uses: openai/codex-action@v1
        continue-on-error: true
        timeout-minutes: 6
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.1-codex-max
          prompt-file: docs/nautilus/prompts/codex-polish.md
          working-directory: ${{ github.workspace }}
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Continue shadow rehearsal without Codex polish if it timed out or failed
        if: steps.codex_polish_shadow.outcome != 'success'
        run: |
          echo "Codex polish did not complete successfully during shadow rehearsal."
          echo "Continuing so the shadow run still validates the rest of the nightly path."

      - name: Format generated research list
        run: npx prettier --write src/components/ResearchList.tsx

      - name: Commit shadow pipeline updates locally
        id: commit_shadow
        run: |
          git config user.name "Claude Workshop"
          git config user.email "info@claudeworkshop.com"
          git add \
            docs/nautilus/data/state \
            content/editorials \
            public/images/editorials \
            src/components/ResearchList.tsx
          if git diff --staged --quiet; then
            echo "No research cycle changes."
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            echo "did_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git diff --staged --name-only)"
          did_publish=false
          if printf '%s\n' "$changed_files" | grep -Eq '^content/editorials/' && \
             printf '%s\n' "$changed_files" | grep -Eq '^public/images/editorials/'; then
            did_publish=true
          fi
          git commit -m "chore: rehearse research cycle [skip deploy]"
          echo "did_commit=true" >> "$GITHUB_OUTPUT"
          echo "did_publish=$did_publish" >> "$GITHUB_OUTPUT"

      - name: Rehearse source push without side effects
        if: steps.commit_shadow.outputs.did_commit == 'true'
        run: |
          git push --dry-run origin HEAD:main

      - name: Rehearse source deploy path without production deploy
        if: steps.commit_shadow.outputs.did_commit == 'true' && steps.commit_shadow.outputs.did_publish == 'true'
        run: |
          VERCEL_BUILD_ONLY=1 bash scripts/vercel-deploy-with-retry.sh

      - name: Rehearse brand sync without pushing mirrors
        if: steps.commit_shadow.outputs.did_commit == 'true' && steps.commit_shadow.outputs.did_publish == 'true'
        run: |
          node scripts/sync-brand-sites.mjs \
            --all \
            --target-root "$RUNNER_TEMP/brand-sync"

      - name: Rehearse mirror pushes without side effects
        if: steps.commit_shadow.outputs.did_commit == 'true' && steps.commit_shadow.outputs.did_publish == 'true'
        run: |
          set -euo pipefail

          for site_dir in \
            "$RUNNER_TEMP/brand-sync/claudeworkshop" \
            "$RUNNER_TEMP/brand-sync/codexworkshop"; do
            test -d "$site_dir"
            (
              cd "$site_dir"
              git push --dry-run origin HEAD:main
            )
          done

      - name: Rehearse mirror deploy paths without production deploy
        if: steps.commit_shadow.outputs.did_commit == 'true' && steps.commit_shadow.outputs.did_publish == 'true'
        run: |
          set -euo pipefail

          VERCEL_TOKEN_CLEAN="$(bash "$GITHUB_WORKSPACE/scripts/resolve-vercel-token.sh" | tr -d '\r\n')"
          VERCEL_ORG_ID_CLEAN="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
          VERCEL_CLAUDE_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CLAUDE_PROJECT_ID" | tr -d '\r\n')"
          VERCEL_CODEX_PROJECT_ID_CLEAN="$(printf '%s' "$VERCEL_CODEX_PROJECT_ID" | tr -d '\r\n')"

          deploy_site() {
            local site_dir="$1"
            local project_id="$2"

            test -d "$site_dir"

            (
              cd "$site_dir"
              export VERCEL_PROJECT_ID="$project_id"
              export VERCEL_ORG_ID="$VERCEL_ORG_ID_CLEAN"
              export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
              export VERCEL_BUILD_ONLY=1
              bash "$GITHUB_WORKSPACE/scripts/vercel-deploy-with-retry.sh"
            )
          }

          deploy_site "$RUNNER_TEMP/brand-sync/claudeworkshop" "$VERCEL_CLAUDE_PROJECT_ID_CLEAN"
          deploy_site "$RUNNER_TEMP/brand-sync/codexworkshop" "$VERCEL_CODEX_PROJECT_ID_CLEAN"

      - name: Rehearse founder notification without email side effect
        if: steps.commit_shadow.outputs.did_commit == 'true' && steps.commit_shadow.outputs.did_publish == 'true'
        run: |
          node docs/nautilus/pipeline/distribute-after-live.mjs --dry-run --skip-live-check

      - name: Verify shadow build
        run: pnpm build

      - name: Upload shadow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-shadow-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            ${{ runner.temp }}/brand-sync
            docs/nautilus/data/live
            docs/nautilus/data/state
            docs/nautilus/data/outbox
