version: 1
name: research_nightly_full_run
owner: cursorworkshop
purpose: >
  Nightly fully-automated research pipeline:
  X bookmark -> scored candidate -> humanized article -> custom hero image ->
  live /research page on all three sites -> founders email.

schedule:
  github_actions_workflow: .github/workflows/research-cycle.yml
  cron_utc: '0 1 * * *'
  frequency: nightly

non_negotiable_rules:
  - A CUSTOM HERO IMAGE IS REQUIRED BEFORE ARTICLE PUBLISH.
  - THE SAME CUSTOM HERO IMAGE MUST BE USED FOR PAGE HERO + OG:IMAGE + TWITTER:IMAGE.
  - THE SAME PUBLISHED ARTICLE MUST ROLL OUT TO CURSOR, CLAUDE, AND CODEX.
  - PUBLISHED BOOKMARK CANDIDATES MUST BE MARKED DONE AND MUST NOT BE RESELECTED BY DEFAULT.

required_secrets:
  - OPENAI_API_KEY
  - X_AUTH_TOKEN
  - X_CT0
  - RESEND_API_KEY
  - BRAND_SYNC_TOKEN
  - VERCEL_TOKEN
  - VERCEL_ORG_ID
  - VERCEL_PROJECT_ID

content_constraints:
  target_read_time_minutes: 5-6
  default_word_range: 450-1100
  default_word_target: 900
  heading_policy:
    - use_only_h1_and_h2
    - no_numbered_section_headings
  composition_policy:
    - paragraph_first
    - occasional_bullets_only_when_useful
    - table_only_when_it_materially_clarifies

pipeline:
  - id: fetch_and_score_x_bookmarks
    script: docs/nautilus/pipeline/fetch-bookmarks-to-csv.mjs
    outputs:
      - docs/nautilus/data/live/X-bookmarks.live.scored.csv
      - docs/nautilus/data/live/X-bookmarks.live.scored.json

  - id: select_best_candidate
    script: docs/nautilus/pipeline/select-next-research-candidate.mjs
    gate:
      - relevance_percent >= 65
    output:
      - docs/nautilus/data/state/X-bookmarks.next-research-candidate.json

  - id: build_article_and_image_package
    script: docs/nautilus/pipeline/build-and-package-research.mjs
    guarantees:
      - article_draft_created
      - humanizer_pass_applied
      - image_style_qa_pass_or_best_generated_attempt_selected
      - image_png_written
      - frontmatter_image_set_to_slug_path
    hard_fail_if:
      - image_generation_failed
      - image_png_missing
    outputs:
      - docs/nautilus/data/outbox/<timestamp>-<slug>/article.mdx
      - docs/nautilus/data/outbox/<timestamp>-<slug>/image.png
      - docs/nautilus/data/outbox/<timestamp>-<slug>/package.json

  - id: apply_package_to_site_repo
    script: docs/nautilus/pipeline/apply-package-to-cursorworkshop.mjs
    hard_fail_if:
      - image_png_missing
    outputs:
      - content/editorials/<slug>.mdx
      - public/images/editorials/<slug>.png
      - src/components/ResearchList.tsx

  - id: deploy_source_and_mirrors
    workflow_steps:
      - git_commit_and_push_main
      - deploy_cursorworkshop_prod
      - sync_claude_and_codex_repos
      - deploy_claudeworkshop_prod
      - deploy_codexworkshop_prod
    output:
      - production_urls_live

  - id: verify_live_and_notify_founders
    script: docs/nautilus/pipeline/distribute-after-live.mjs
    checks:
      - GET /research/<slug> returns 200 on claudeworkshop.com
      - GET /research/<slug> returns 200 on claudeworkshop.com
      - GET /research/<slug> returns 200 on codexworkshop.com
      - page_hero_image == /images/editorials/<slug>.png
    provider: resend
    recipients:
      - contact@rogyr.com
      - vasilis@vasilistsolis.com

success_definition:
  - github_action_conclusion == success
  - article_committed == true
  - image_committed == true
  - research_urls_live == true
  - resend_email_sent == true

failure_policy:
  - stop_on_first_hard_fail
  - no_founder_email_without_live_research_urls
